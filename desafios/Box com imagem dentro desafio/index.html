<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box com Imagem dentro</title>
    <style>
        #card{
            height: 429px;
            width: 341px;
            margin: auto;
        }
        h1{
            text-align: center;
            font-size: 20px;
            margin-top: 15px;
        }
        #card > img{
            width: 100%;
            border-radius: 10px;
            box-shadow: 8px 8px 6px rgb(0 0 0 / 89%);
            border: 100px;
            margin-top: 50px;
            background-color: white;
        }
        nav{
        width: 58px;
        height: 24px;
        margin: auto;
        font-size: 21px;
        outline: solid;
        color: black;
        border: 2px solid black;
        border-radius: 5px;
        text-decoration: none;
        padding: 5px 12px;
        }
        a{
            color: black;
        }
        a:hover{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div id="card">
        <img src="Minha imagem.jpeg" alt="">
        <h1>Ian Gonçalves Silva
        Bodybuilder e estudante
    </h1>
    <a href="https://www.instagram.com/ian_goncalves_silva/" target="_blank" self="external">
        <nav>Seguir</nav>
    </a>
    </div>
    
</body>
</html>
