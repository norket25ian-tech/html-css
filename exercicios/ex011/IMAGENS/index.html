<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em html5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do navegador</p>
    <picture>
     <source media="(max-width:700px)" srcset="God_of_war_pequeno.png" type="image/png">
     <source media="(max-width:1200px)" srcset="God_of_war_medio_1.jpg"type="image/jpeg">
     <img src="Imagem_Grande_God_Of_War.webp"  alt="Foto grande do god of war">
     </picture>

     <h1>Reproduzindo audios no HTML</h1>
     <p>aqui abaixo está um audio</p>
     <audio preload="metadata" controls autoplay loop>
        <source src="guanacast-33.mp3" type="audio/mpeg">
        <source src="guanacast-33.ogg" type="audio/ogg">
        <source src="guanacast-33.wav" type="image/wav">
        <p>Seu navegador não suporta áudio <a href="guanacast-33.mp3"type="audio/mpeg"></a></p>
    </audio>
   </body>

</html>
