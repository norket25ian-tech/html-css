<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fontes externas</title>
    <style>
         @font-face {
    font-family: 'Ancient Medium';
    src: url('Ancient\ Medium.ttf') format('truetype');
         } 

            /* Tipos de formato()
            -Open type (OTF)
            true type(ttf)
            embedded-opentype
            truetype-aat(Apple advanced Typography)
            -svg
            */
        body{ 
            font-family: Arial, Helvetica,sans-serif;
        }    
        h1{
            font-family:'Ancient Medium',Times,serif ;
            font-size: 2em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere impedit quisquam harum explicabo amet optio beatae soluta, blanditiis ipsa laudantium cum vel praesentium eius! Vitae error optio quo quaerat veritatis.</p>
</body>
</html>
